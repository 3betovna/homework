<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика таблица "Июнь 2025"</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table class="container">
        <caption class="title">Июнь 2025</caption>
        <thead>
            <tr class="days">
                <th>Пн</th>
                <th>Вт</th>
                <th>Ср</th>
                <th>Чт</th>
                <th>Пт</th>
                <th class="color__red">Сб</th>
                <th class="color__red">Вс</th>
            </tr>
        </thead>
        <tbody>
            <tr class="numbers">
                <td colspan="6"></td>
                <td class="color__red">01</td>
            </tr>
            <tr class="numbers">
                <td>02</td>
                <td>03</td>
                <td>04</td>
                <td>05</td>
                <td>06</td>
                <td class="color__red">07</td>
                <td class="color__red">08</td>
            </tr>
            <tr class="numbers">
                <td>09</td>
                <td>10</td>
                <td>11</td>
                <td>12</td>
                <td>13</td>
                <td class="color__red">14</td>
                <td class="color__red">15</td>
            </tr>
            <tr class="numbers">
                <td>16</td>
                <td>17</td>
                <td>18</td>
                <td>19</td>
                <td>20</td>
                <td class="color__red">21</td>
                <td class="color__red">22</td>
            </tr>
            <tr class="numbers">
                <td>23</td>
                <td>24</td>
                <td>25</td>
                <td>26</td>
                <td>27</td>
                <td class="color__red">28</td>
                <td class="color__red">29</td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="numbers">
                <td>30</td>
                <td colspan="6"></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
