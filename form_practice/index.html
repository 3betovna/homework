<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Практика по формам</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<form>
			<fieldset class="wrapper">
                <h1 class="title">Ваши личные данные</h1>
				<label class="personal-info" for="#name">
                    Ваше имя
                </label>
				<input id="name" type="text" name="name" placeholder="Имя" required>
				<label class="personal-info" for="#age">
                    Ваш возраст
                </label>
				<input id="age" type="number" name="age" placeholder="Возраст" required>
				<label class="personal-info" for="#numbertel">
                    Ваш номер телефона
                </label>
				<input id="numbertel" inputmode="tel" name="number" placeholder="Номер телефона" required>
				<label class="personal-info" for="#email">
                    Ваша почта
                </label>
				<input id="email" type="email" name="email" placeholder="Почта" required>
                <label for="#message" class="personal-info__message">
                    Сообщение
                </label>
                <textarea class="info__message" name="message" id="message" placeholder="Ваше сообщение" required></textarea>
				<label class="checkbox-rules">
					<input class="checkbox-rules__item" type="checkbox" required>
					Я принимаю правила
				</label>
				<button class="button" type="submit">Отправить</button>
			</fieldset>
		</form>
	</body>
</html>
